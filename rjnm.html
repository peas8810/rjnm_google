<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff;--b:#e5e7eb;--t:#0f172a;--m:#64748b;--m2:#94a3b8;--a:#111827;--badge:#f1f5f9;--sh:0 1px 0 rgba(15,23,42,.04),0 8px 18px rgba(15,23,42,.08);}
    body{margin:0;background:transparent;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    .card{background:var(--bg);border:1px solid var(--b);border-radius:14px;box-shadow:var(--sh);padding:10px;}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
    .ttl{font-size:12px;font-weight:900;margin:0;}
    .sub{font-size:10px;font-weight:700;color:var(--m);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
    .pill{font-size:10px;font-weight:900;color:var(--m);background:var(--badge);border:1px solid var(--b);padding:4px 8px;border-radius:999px;white-space:nowrap;}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:8px 0;}
    .stat{border:1px solid var(--b);border-radius:12px;padding:8px;background:#fff;}
    .k{font-size:9px;font-weight:900;color:var(--m);text-transform:uppercase;letter-spacing:.06em;}
    .v{font-size:12px;font-weight:900;margin-top:2px;}
    .spark{border:1px solid var(--b);border-radius:12px;padding:8px;background:linear-gradient(180deg,#fff,#fafafa);}
    canvas{width:100% !important;height:62px !important;}
    .foot{margin-top:6px;font-size:10px;font-weight:700;color:var(--m2);display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;}
    a{color:inherit;text-decoration:none} a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="card">
  <div class="top">
    <div>
      <div class="ttl">Google Scholar • RJNM</div>
      <div class="sub" id="name">Carregando…</div>
    </div>
    <div class="pill">Premium</div>
  </div>

  <div class="grid">
    <div class="stat"><div class="k">Citações</div><div class="v" id="c">—</div></div>
    <div class="stat"><div class="k">h-index</div><div class="v" id="h">—</div></div>
    <div class="stat"><div class="k">i10</div><div class="v" id="i10">—</div></div>
  </div>

  <div class="spark">
    <canvas id="chart"></canvas>
  </div>

  <div class="foot">
    <div>Atualização: <span id="u">—</span></div>
    <div><a id="link" href="#" target="_blank" rel="noopener">UJN</a></div>
  </div>
</div>

<script>
(async function(){
  const RAW = "https://raw.githubusercontent.com/peas8810/rjnm_google/main/rjnm-scholar.json";
  const $ = (id)=>document.getElementById(id);

  const res = await fetch(RAW + "?t=" + Date.now(), { cache:"no-store" });
  if(!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();

  $("name").textContent = data.profile_name ?? "RJNM (Google Scholar)";
  $("u").textContent = data.updated_at ?? "—";
  $("link").href = data.source ?? "https://scholar.google.com/";

  const m = data.metrics || {};
  $("c").textContent = (m.citations_all ?? "—");
  $("h").textContent = (m.h_index_all ?? "—");
  $("i10").textContent = (m.i10_index_all ?? "—");

  const s = Array.isArray(data.citations_by_year) ? data.citations_by_year : [];
  const labels = s.map(x=>x.year);
  const vals = s.map(x=>Number(x.value));
  const valid = vals.filter(v=>Number.isFinite(v));
  if(!valid.length) return;

  const min = Math.min(...valid), max = Math.max(...valid);
  const pad = (max-min)*0.15 || 1;

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{labels, datasets:[{
      data: vals,
      borderWidth: 2,
      tension: .35,
      fill: false,
      pointRadius: 0
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{enabled:true}},
      scales:{
        x:{display:false},
        y:{display:false, min:min-pad, max:max+pad}
      }
    }
  });
})();
</script>
</body>
</html>
